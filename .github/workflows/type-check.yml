name: TypeScript Type Check

on:
  push:
    branches: [main, develop, TRAC-*]
  pull_request:
    branches: [main, develop]

jobs:
  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npx tsc --noEmit

      - name: Report success
        if: success()
        run: echo " TypeScript type checking passed!"

      - name: Report failure
        if: failure()
        run: echo " TypeScript type checking failed. Please fix the type errors."
