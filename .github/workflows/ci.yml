name: Track&Go CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: в¬ҮпёҸ Checkout Repository
        uses: actions/checkout@v4

      - name: вҡҷпёҸ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: ніҰ Install Dependencies
        run: npm ci

      - name: нҙҚ Run Linter (ESLint)
        run: npm run lint

      - name: н»ЎпёҸ Run Type-Checking (TypeScript)
        run: npx tsc --noEmit

